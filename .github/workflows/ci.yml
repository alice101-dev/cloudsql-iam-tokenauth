name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Build, vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          # Latest stable toolchain, not the (possibly stale) patch pinned in
          # go.mod — stdlib vulnerabilities are fixed by patch releases, and
          # govulncheck scans the stdlib of the toolchain that builds the code.
          go-version: stable
          check-latest: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  govulncheck:
    name: Vulnerability scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          # Latest stable toolchain, not the (possibly stale) patch pinned in
          # go.mod — stdlib vulnerabilities are fixed by patch releases, and
          # govulncheck scans the stdlib of the toolchain that builds the code.
          go-version: stable
          check-latest: true

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  gitleaks:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so Gitleaks scans every commit, not just HEAD

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}

  semgrep:
    name: SAST (Semgrep CE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        run: pip install semgrep

      # Lean rule set: p/golang + p/gosec for language-specific issues,
      # p/cwe-top-25 for the broad classics. Secrets are NOT scanned here —
      # the dedicated Gitleaks job owns that (avoids duplicate findings).
      - name: Semgrep scan
        run: |
          semgrep scan \
            --config p/golang \
            --config p/gosec \
            --config p/cwe-top-25 \
            --error

  golangci:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
